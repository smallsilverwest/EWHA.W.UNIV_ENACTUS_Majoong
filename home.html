<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 홈</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col relative">
        <div id="missing-banner" class="hidden bg-red-600 text-white text-center py-2 text-sm font-bold sticky top-0">
            ● 현재, 실종 신고가 접수된 어르신입니다. ●
        </div>

        <div class="p-6 text-center mt-10">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">마중안심밴드</h1>
            <p class="text-gray-500 mb-10">어르신의 안전한 귀가를 돕습니다.</p>
            
            <div id="status-card" class="bg-blue-50 border border-blue-100 rounded-3xl p-8 mb-8">
                <p id="status-text" class="text-blue-600 font-bold text-lg">어르신 정보를 확인하시겠습니까?</p>
            </div>

            <a href="info.html" class="block w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg mb-4">어르신 정보 확인하기</a>
            <a href="admin.html" class="block w-full text-gray-400 py-2 text-sm">보호자 관리 모드</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* 본인의 Config 복사 */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "elders", "elder01"), (doc) => {
            if (doc.exists() && doc.data().isMissing) {
                document.getElementById('missing-banner').classList.remove('hidden');
                document.getElementById('status-card').className = "bg-red-50 border border-red-100 rounded-3xl p-8 mb-8";
                document.getElementById('status-text').innerText = "🚨 현재 실종 신고 상태입니다!";
                document.getElementById('status-text').className = "text-red-600 font-bold text-lg";
            }
        });
    </script>
</body>
</html>
