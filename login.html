<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 보호자 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center items-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-white shadow-xl p-10 rounded-[2.5rem] text-center mx-4 border border-gray-100">
        <div class="mb-6 text-6xl">🔒</div>
        <h1 class="text-2xl font-black text-gray-900 mb-2">보호자 로그인</h1>
        <p class="text-gray-400 font-medium mb-10">설정하신 PIN 번호 4자리를<br>입력해주세요.</p>

        <input type="password" id="pin-input" maxlength="4" inputmode="numeric" placeholder="••••" 
            class="w-full text-center text-4xl tracking-[1.5rem] border-b-4 border-gray-100 focus:border-blue-500 outline-none mb-12 pb-4 transition-colors font-black">

        <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-black shadow-lg active:scale-95 transition-all">로그인</button>
        <button onclick="history.back()" class="mt-6 text-gray-400 font-bold hover:text-gray-600 transition-colors">취소</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyARCEpqFrnnCg6bbDzC7etXK_Ypnyc_1yY",
            projectId: "safeloop-majung"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const urlParams = new URLSearchParams(window.location.search);
        const elderId = urlParams.get('id') || "demo";

        document.getElementById('btn-login').onclick = async () => {
            const inputPin = document.getElementById('pin-input').value;
            const docSnap = await getDoc(doc(db, "Users", elderId));
            
            if (docSnap.exists() && docSnap.data().pin === inputPin) {
                location.href = `admin.html?id=${elderId}`;
            } else {
                alert("PIN 번호가 일치하지 않습니다.");
                document.getElementById('pin-input').value = "";
            }
        };
    </script>
</body>
</html>
