<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 보호자 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #f97316; color: #f97316; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center text-gray-800 font-sans">

    <div id="admin-main" class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col relative overflow-hidden">
        <div class="flex justify-between items-center px-6 py-4 border-b">
            <h1 class="text-lg font-bold">보호자 관리</h1>
            <button id="btn-logout" class="bg-gray-100 px-3 py-1 rounded-lg text-gray-600 text-sm font-bold active:scale-95">홈으로</button>
        </div>

        <div class="flex border-b text-center text-[15px] text-gray-400">
            <button id="tab-missing" onclick="switchTab('missing')" class="flex-1 py-4 tab-active">실종 상태</button>
            <button id="tab-info" onclick="switchTab('info')" class="flex-1 py-4">어르신 정보</button>
            <button id="tab-pin" onclick="switchTab('pin')" class="flex-1 py-4">PIN 변경</button>
        </div>

        <div class="p-6 flex-1 overflow-y-auto">
            <div id="content-missing">
                <div id="status-card" class="w-full mb-6 text-center border-2 rounded-[2rem] p-10 shadow-sm mt-4">
                    <div id="status-icon" class="text-5xl mb-4">⌛</div>
                    <h2 id="status-title" class="text-xl font-black mb-1">데이터 로딩 중...</h2>
                    <p id="last-update" class="text-[12px] text-gray-400 font-medium">잠시만 기다려 주세요.</p>
                </div>
                <button id="toggle-btn" class="w-full py-5 rounded-3xl font-black text-xl shadow-lg transition-all active:scale-95 mb-4">
                    상태 변경하기
                </button>
                <p class="text-center text-gray-400 text-[11px] leading-relaxed">
                    상태를 변경하면 어르신 태깅 시 나타나는<br>화면이 즉시 변경됩니다.
                </p>
            </div>

            <div id="content-info" class="hidden space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">보호자 연락처</label>
                    <input id="info-guardian-phone" type="tel" class="w-full border-2 border-gray-100 rounded-2xl p-4 focus:border-orange-500 outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">관할 경찰서</label>
                    <input id="info-police" type="text" class="w-full border-2 border-gray-100 rounded-2xl p-4 focus:border-orange-500 outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">등록 센터</label>
                    <input id="info-center" type="text" class="w-full border-2 border-gray-100 rounded-2xl p-4 focus:border-orange-500 outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 ml-1">센터 연락처</label>
                    <input id="info-center-phone" type="tel" class="w-full border-2 border-gray-100 rounded-2xl p-4 focus:border-orange-500 outline-none transition-all font-bold">
                </div>
                <button id="btn-save-info" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black text-lg shadow-lg active:scale-95 mt-4">
                    정보 저장하기
                </button>
            </div>

            <div id="content-pin" class="hidden space-y-5">
                <div class="bg-gray-50 p-6 rounded-3xl mb-4 text-center">
                    <p class="text-sm text-gray-500 font-medium">새로운 보안 PIN 4자리를<br>설정해 주세요.</p>
                </div>
                <input id="new-pin" type="password" maxlength="4" class="w-full border-2 border-gray-100 rounded-2xl p-4 text-center text-2xl focus:border-orange-500 outline-none transition-all" placeholder="새 PIN">
                <input id="confirm-pin" type="password" maxlength="4" class="w-full border-2 border-gray-100 rounded-2xl p-4 text-center text-2xl focus:border-orange-500 outline-none transition-all" placeholder="PIN 확인">
                <button id="btn-change-pin" disabled class="w-full bg-gray-300 text-white py-5 rounded-3xl font-black text-lg shadow-sm cursor-not-allowed">
                    PIN 변경하기
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARCEpqFrnnCg6bbDzC7etXK_Ypnyc_1yY",
            authDomain: "safeloop-majung.firebaseapp.com",
            projectId: "safeloop-majung",
            storageBucket: "safeloop-majung.firebasestorage.app",
            messagingSenderId: "1031230129161",
            appId: "1:1031230129161:web:5d164644d2a9857f5aa4d8",
            measurementId: "G-KPX19HQ2JG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        
        // [반영] Users 컬렉션, demo 문서 ID 사용
        const elderId = urlParams.get('id') || "demo";
        const docRef = doc(db, "Users", elderId);

        document.getElementById('btn-logout').onclick = () => location.href = `index.html?id=${elderId}`;

        // UI 실시간 업데이트 함수
        function updateStatusUI(data) {
            const card = document.getElementById('status-card');
            const title = document.getElementById('status-title');
            const icon = document.getElementById('status-icon');
            const btn = document.getElementById('toggle-btn');
            const timeElement = document.getElementById('last-update');
        
            // 1. 시간 정보
            let timeText = data.updateTime?.toDate ? data.updateTime.toDate().toLocaleString() : "-";
            
            // 2. 발견 위치 확인 버튼 로직 (수정됨)
            let locationHtml = "";
            if (data.updateLoc) {
                const lat = data.updateLoc.latitude;
                const lng = data.updateLoc.longitude;
                // 표준 구글 지도 좌표 검색 링크로 수정
                const mapUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                
                locationHtml = `
                    <div class="mt-4 pt-4 border-t border-gray-100 flex flex-col items-center">
                        <span class="text-orange-500 font-bold text-[11px] mb-2">📍 마지막 태깅 위치 발견</span>
                        <a href="${mapUrl}" target="_blank" 
                           class="bg-orange-50 border border-orange-200 px-4 py-2 rounded-full text-[12px] text-orange-600 font-bold active:scale-95 transition-all">
                            지도에서 위치 확인하기 ↗
                        </a>
                    </div>
                `;
            }
        
            timeElement.innerHTML = `마지막 업데이트: ${timeText} ${locationHtml}`;
        
            // 3. 실종 상태에 따른 카드 디자인
            if (data.isMissing) {
                card.className = "w-full mb-6 text-center border-2 border-red-100 bg-red-50 rounded-[2rem] p-10 shadow-sm mt-4";
                title.innerText = "실종 신고 접수됨";
                title.className = "text-xl font-black mb-1 text-red-600";
                icon.innerText = "🚨";
                btn.innerText = "실종 신고 해제하기";
                btn.className = "w-full py-5 rounded-3xl font-black text-xl shadow-lg bg-emerald-500 text-white active:scale-95 mb-4";
            } else {
                card.className = "w-full mb-6 text-center border-2 border-emerald-100 bg-emerald-50 rounded-[2rem] p-10 shadow-sm mt-4";
                title.innerText = "정상 상태";
                title.className = "text-xl font-black mb-1 text-emerald-600";
                icon.innerText = "✅";
                btn.innerText = "실종 신고 등록하기";
                btn.className = "w-full py-5 rounded-3xl font-black text-xl shadow-lg bg-red-600 text-white active:scale-95 mb-4";
            }
        
            btn.onclick = async () => {
                await updateDoc(docRef, { isMissing: !data.isMissing });
            };
        }

        // 실시간 데이터 감시
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                updateStatusUI(data);
                
                // 정보 수정 탭 초기값 세팅
                document.getElementById('info-guardian-phone').value = data.guardian_phone || "";
                document.getElementById('info-police').value = data.police_loc || "";
                document.getElementById('info-center').value = data.center_loc || "";
                document.getElementById('info-center-phone').value = data.center_phone || "";
            }
        });

        // 정보 저장 버튼
        document.getElementById('btn-save-info').onclick = async () => {
            await updateDoc(docRef, {
                guardian_phone: document.getElementById('info-guardian-phone').value,
                police_loc: document.getElementById('info-police').value,
                center_loc: document.getElementById('info-center').value,
                center_phone: document.getElementById('info-center-phone').value
            });
            alert("저장되었습니다.");
        };

        // 탭 전환 로직
        window.switchTab = (tab) => {
            ['missing', 'info', 'pin'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        };

        // PIN 변경 로직
        const nPin = document.getElementById('new-pin');
        const cPin = document.getElementById('confirm-pin');
        const pBtn = document.getElementById('btn-change-pin');
        const valPin = () => {
            const ok = nPin.value.length === 4 && nPin.value === cPin.value;
            pBtn.disabled = !ok;
            pBtn.className = ok ? "w-full bg-orange-500 text-white py-5 rounded-3xl font-black text-lg shadow-lg active:scale-95" : "w-full bg-gray-300 text-white py-5 rounded-3xl font-black text-lg shadow-sm cursor-not-allowed";
        };
        nPin.oninput = valPin; cPin.oninput = valPin;
        pBtn.onclick = async () => {
            await updateDoc(docRef, { pin: nPin.value });
            alert("PIN이 변경되었습니다.");
            nPin.value = ""; cPin.value = ""; valPin();
        };
    </script>
</body>
</html>
