<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 보호자 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center text-gray-800 font-sans">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col relative overflow-hidden">
        
        <div class="flex justify-between items-center px-6 py-4 border-b">
            <h1 class="text-lg font-bold">보호자 관리</h1>
            <button onclick="location.href='home.html'" class="text-gray-400 text-sm">로그아웃</button>
        </div>

        <div class="flex border-b text-center text-[15px] text-gray-400">
            <button id="tab-missing" onclick="switchTab('missing')" class="flex-1 py-4 tab-active">실종 상태</button>
            <button id="tab-info" onclick="switchTab('info')" class="flex-1 py-4">어르신 정보</button>
            <button id="tab-pin" onclick="switchTab('pin')" class="flex-1 py-4">PIN 변경</button>
        </div>

        <div class="p-6 flex-1 overflow-y-auto">
            
            <div id="content-missing" class="flex flex-col items-center">
                <div class="w-full mb-10 text-center bg-gray-50 border border-gray-100 rounded-[2rem] p-12 shadow-sm mt-8">
                    <p class="text-gray-400 text-sm mb-2">현재 상태</p>
                    <h2 id="status-text" class="text-3xl font-black transition-colors duration-300">정상 상태</h2>
                </div>
                <button id="toggle-btn" class="w-full py-5 rounded-3xl font-black text-xl shadow-lg transition-all active:scale-95 mb-4"></button>
                <p class="text-center text-gray-400 text-[11px] leading-relaxed">
                    버튼을 누르면 즉시 시스템 상태가 업데이트되며,<br>안심밴드 스캔 시 표시되는 화면이 바뀝니다.
                </p>
            </div>

            <div id="content-info" class="hidden space-y-5">
                <div>
                    <label class="text-xs text-gray-500 font-bold mb-1 block">이름</label>
                    <input id="info-name" type="text" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="성함을 입력하세요">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 font-bold mb-1 block">성별</label>
                        <select id="info-gender" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500">
                            <option value="남">남</option>
                            <option value="여">여</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 font-bold mb-1 block">나이</label>
                        <input id="info-age" type="number" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="79">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold mb-1 block">주소</label>
                    <input id="info-address" type="text" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="거주지 주소">
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold mb-1 block">관할 경찰서</label>
                    <input id="info-police" type="text" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="OO경찰서">
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold mb-1 block">등록 센터</label>
                    <input id="info-center" type="text" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="OO치매안심센터">
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold mb-1 block">보호자 연락처</label>
                    <input id="info-guardian-phone" type="tel" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="010-0000-0000">
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold mb-1 block">센터 연락처</label>
                    <input id="info-center-phone" type="tel" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="02-000-0000">
                </div>
                <button onclick="saveElderInfo()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all mt-4">
                    저장하기
                </button>
            </div>

            <div id="content-pin" class="hidden">
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6 mb-8 text-sm text-gray-500 text-center mt-4">
                    PIN은 숫자 4자리로 설정해 주세요.
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-gray-500 font-bold mb-1 block">새 PIN</label>
                        <input id="new-pin" type="password" maxlength="4" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="새 PIN 4자리">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 font-bold mb-1 block">새 PIN 확인</label>
                        <input id="confirm-pin" type="password" maxlength="4" class="w-full border rounded-2xl p-4 bg-gray-50 outline-none focus:border-blue-500" placeholder="새 PIN 재입력">
                    </div>
                    <button onclick="changePin()" class="w-full bg-gray-300 text-white py-5 rounded-3xl font-black text-lg shadow-sm mt-8 cursor-not-allowed" id="pin-btn" disabled>
                        PIN 변경하기
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphUEAQmK1XXYnNcQYK5NEOFDfxleNaAQ",
            authDomain: "majung-260402v1.firebaseapp.com",
            projectId: "majung-260402v1",
            storageBucket: "majung-260402v1.firebasestorage.app",
            messagingSenderId: "18043440169",
            appId: "1:18043440169:web:f5f131e3fa0426ef126038",
            measurementId: "G-4CHSF7NFGR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "elders", "elder01");

        let currentMissingStatus = false;

        // 1. 실시간 데이터 동기화 (상태 및 정보)
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                currentMissingStatus = data.isMissing;

                // 실종 상태 탭 UI 업데이트
                const statusText = document.getElementById('status-text');
                const toggleBtn = document.getElementById('toggle-btn');
                
                if (currentMissingStatus) {
                    statusText.innerText = "실종 신고 중";
                    statusText.className = "text-3xl font-black text-red-600";
                    toggleBtn.innerText = "신고 해제하기";
                    toggleBtn.className = "w-full py-5 rounded-3xl font-black text-xl shadow-lg transition-all active:scale-95 bg-blue-600 text-white";
                } else {
                    statusText.innerText = "정상 상태";
                    statusText.className = "text-3xl font-black text-blue-600";
                    toggleBtn.innerText = "실종 신고 등록하기";
                    toggleBtn.className = "w-full py-5 rounded-3xl font-black text-xl shadow-lg transition-all active:scale-95 bg-red-600 text-white";
                }

                // 정보 수정 탭 데이터 채우기
                document.getElementById('info-name').value = data.name || "";
                document.getElementById('info-gender').value = data.gender || "남";
                document.getElementById('info-age').value = data.age || "";
                document.getElementById('info-address').value = data.address || "";
                document.getElementById('info-police').value = data.police || "";
                document.getElementById('info-center').value = data.center || "";
                document.getElementById('info-guardian-phone').value = data.guardian_phone || "";
                document.getElementById('info-center-phone').value = data.center_phone || "";
            }
        });

        // 2. 실종 상태 토글 함수
        window.toggleMissing = async () => {
            await updateDoc(docRef, { isMissing: !currentMissingStatus });
            alert(currentMissingStatus ? "실종 신고가 등록되었습니다." : "실종 신고가 해제제되었습니다.");
        };
        document.getElementById('toggle-btn').onclick = window.toggleMissing;

        // 3. 어르신 정보 저장 함수
        window.saveElderInfo = async () => {
            try {
                await updateDoc(docRef, {
                    name: document.getElementById('info-name').value,
                    gender: document.getElementById('info-gender').value,
                    age: document.getElementById('info-age').value,
                    address: document.getElementById('info-address').value,
                    police: document.getElementById('info-police').value,
                    center: document.getElementById('info-center').value,
                    guardian_phone: document.getElementById('info-guardian-phone').value,
                    center_phone: document.getElementById('info-center-phone').value
                });
                alert("정보가 성공적으로 저장되었습니다.");
            } catch (e) { alert("저장 실패: " + e.message); }
        };

        // 4. PIN 변경 로직
        const pinInput = document.getElementById('new-pin');
        const confirmInput = document.getElementById('confirm-pin');
        const pinBtn = document.getElementById('pin-btn');

        const validatePin = () => {
            if (pinInput.value.length === 4 && pinInput.value === confirmInput.value) {
                pinBtn.disabled = false;
                pinBtn.classList.replace('bg-gray-300', 'bg-blue-600');
                pinBtn.classList.remove('cursor-not-allowed');
            } else {
                pinBtn.disabled = true;
                pinBtn.classList.replace('bg-blue-600', 'bg-gray-300');
                pinBtn.classList.add('cursor-not-allowed');
            }
        };
        pinInput.oninput = validatePin;
        confirmInput.oninput = validatePin;

        window.changePin = async () => {
            await updateDoc(docRef, { pin: pinInput.value });
            alert("PIN이 변경되었습니다.");
            pinInput.value = "";
            confirmInput.value = "";
            validatePin();
        };

        // 5. 탭 전환 로직
        window.switchTab = (tab) => {
            const tabs = ['missing', 'info', 'pin'];
            tabs.forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        };
    </script>
</body>
</html>
